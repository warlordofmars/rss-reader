name: CI/CD

on:
  push:
    branches: [main, development]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Lint (ruff)
        run: uv run inv lint-backend

      - name: Security audit (pip-audit)
        run: uv run inv audit-backend

      - name: Test
        run: uv run inv test-backend

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (ESLint)
        run: uv run inv lint-frontend

      - name: Security audit (npm audit)
        run: uv run inv audit-frontend

      - name: Test
        run: uv run inv test-frontend

      - name: Test Report
        if: always()
        run: |
          python3 - <<'PYEOF' >> $GITHUB_STEP_SUMMARY
          import xml.etree.ElementTree as ET

          tree = ET.parse("frontend/vitest-report.xml")
          root = tree.getroot()
          suites = root.findall("testsuite") if root.tag == "testsuites" else [root]

          total_tests = total_pass = total_fail = 0
          rows = []
          for suite in suites:
              for tc in suite.findall("testcase"):
                  failed = tc.find("failure") is not None or tc.find("error") is not None
                  skipped = tc.find("skipped") is not None
                  icon = "⏭️" if skipped else ("❌" if failed else "✅")
                  rows.append((icon, tc.get("classname", ""), tc.get("name", "")))
                  total_tests += 1
                  if not skipped:
                      if failed:
                          total_fail += 1
                      else:
                          total_pass += 1

          print("## Vitest Test Report\n")
          print("### Summary\n")
          print(f"- Test Results: {'✅' if total_fail == 0 else '❌'} **{total_pass} passed** · {total_fail} failed · {total_tests} total\n")
          print("### Tests\n")
          print("| | Suite | Test |")
          print("| --- | --- | --- |")
          for icon, suite, name in rows:
              print(f"| {icon} | {suite} | {name} |")
          PYEOF

  infra:
    name: Infra (lint + synth)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Lint (ruff)
        run: uv run inv lint-infra

      - name: Synth (no-staging skips Docker bundling)
        run: uv run inv synth
        env:
          AWS_ACCOUNT_ID: "123456789012"

  deploy-dev:
    name: Deploy (dev)
    needs: [backend, frontend, infra]
    if: github.ref == 'refs/heads/development' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy dev
        run: uv run inv deploy --env dev
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

  e2e:
    name: E2E tests (dev)
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Run E2E tests
        run: uv run inv test-e2e --env dev --admin-pass "${{ secrets.DEV_ADMIN_PASSWORD || 'admin' }}"

  browser-e2e:
    name: Browser E2E tests (dev)
    needs: [deploy-dev, e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: uv run inv playwright --env dev --admin-email "${{ secrets.DEV_E2E_EMAIL || 'e2e@test.com' }}"
        env:
          CI: "true"

      - name: Playwright step summary
        if: always()
        run: |
          python3 - <<'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json, pathlib

          path = pathlib.Path("frontend/playwright-report/results.json")
          if not path.exists():
              print("## Playwright Test Report\n\n_No results found._")
              exit()

          data = json.loads(path.read_text())
          suites = data.get("suites", [])

          rows = []
          def walk(suite, prefix=""):
              title = suite.get("title", "")
              full = f"{prefix}{title}" if not prefix else f"{prefix} › {title}"
              for spec in suite.get("specs", []):
                  for test in spec.get("tests", []):
                      status = test.get("status", "unknown")
                      results = test.get("results", [])
                      outcome = results[-1].get("status", status) if results else status
                      icon = {"passed": "✅", "failed": "❌", "skipped": "⏭️", "flaky": "⚠️"}.get(outcome, "❓")
                      rows.append((icon, full, spec.get("title", "")))
              for child in suite.get("suites", []):
                  walk(child, full)

          for suite in suites:
              walk(suite)

          passed = sum(1 for r in rows if r[0] == "✅")
          failed = sum(1 for r in rows if r[0] == "❌")
          skipped = sum(1 for r in rows if r[0] == "⏭️")
          flaky = sum(1 for r in rows if r[0] == "⚠️")
          overall = "✅" if failed == 0 else "❌"

          print("## Playwright Test Report\n")
          print(f"**{overall} {passed} passed · {failed} failed · {skipped} skipped{' · ' + str(flaky) + ' flaky' if flaky else ''}**\n")
          print("| | Suite | Test |")
          print("| --- | --- | --- |")
          for icon, suite, test in rows:
              print(f"| {icon} | {suite} | {test} |")
          PYEOF

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  release:
    name: Release
    needs: [backend, frontend, infra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version, tag, and create GitHub release
        id: get-version
        run: |
          python3 - <<'PYEOF'
          import os, re, subprocess

          def run(cmd):
              return subprocess.check_output(cmd, text=True).strip()

          try:
              last_tag = run(["git", "describe", "--tags", "--abbrev=0"])
          except Exception:
              last_tag = "v0.0.0"

          major, minor, patch = (int(x) for x in last_tag.lstrip("v").split("."))

          try:
              log = run(["git", "log", f"{last_tag}..HEAD", "--pretty=format:%s"])
          except Exception:
              log = ""

          bump = "patch"  # default: at least a patch bump
          for msg in log.splitlines():
              if re.search(r"^[a-z]+(\(.+\))?!:|BREAKING CHANGE", msg):
                  bump = "major"
                  break
              elif re.search(r"^feat(\(.+\))?:", msg) and bump != "major":
                  bump = "minor"

          if bump == "major":
              new_version = f"{major + 1}.0.0"
          elif bump == "minor":
              new_version = f"{major}.{minor + 1}.0"
          else:
              new_version = f"{major}.{minor}.{patch + 1}"

          print(f"Last tag:    {last_tag}")
          print(f"Bump type:   {bump}")
          print(f"New version: {new_version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={new_version}\n")
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and publish GitHub release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.get-version.outputs.version }}"
          git push origin "v${{ steps.get-version.outputs.version }}"
          gh release create "v${{ steps.get-version.outputs.version }}" \
            --title "v${{ steps.get-version.outputs.version }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy
        run: uv run inv deploy
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          APP_VERSION: ${{ needs.release.outputs.version }}

  smoke:
    name: Smoke tests (prod)
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install backend dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Run smoke tests
        run: uv run inv smoke --admin-pass "${{ secrets.PROD_ADMIN_PASSWORD || 'admin' }}"

  back-merge:
    name: Open back-merge PR (main → development)
    needs: [smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Create and auto-merge back-merge PR
        run: uv run inv back-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
