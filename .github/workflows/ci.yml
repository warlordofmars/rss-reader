name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: backend

      - name: Lint (ruff)
        run: uv run inv lint-backend

      - name: Security audit (pip-audit)
        # CVE-2026-4539: affects pygments (transitive dep of pip-audit itself), no fix available yet
        run: uv run pip-audit --ignore-vuln CVE-2026-4539
        working-directory: backend

      - name: Test
        run: uv run inv test-backend

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (ESLint)
        run: uv run inv lint-frontend

      - name: Security audit (npm audit)
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Test
        run: uv run inv test-frontend

  infra:
    name: Infra (lint + synth)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Lint (ruff)
        run: uv run inv lint-infra

      - name: Synth (no-staging skips Docker bundling)
        run: uv run inv synth
        env:
          AWS_ACCOUNT_ID: "123456789012"

  deploy:
    name: Deploy
    needs: [backend, frontend, infra]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC token
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Deploy
        run: uv run inv deploy
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
